<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Location | Tickpin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d7fce;
            --primary-light: #f4edf9;
            --text-dark: #333333;
            --text-gray: #686868;
            --border: #e0d0f0;
            --bg-page: #f8f9fa;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .modal-container {
            background: var(--white);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            border-radius: 0;
            /* Full screen or large container feel */
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 900px) {
            .modal-container {
                border-radius: 24px;
                min-height: auto;
                margin: 40px;
            }
        }

        h2.section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0 0 20px 0;
        }

        /* Search Section */
        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .searchbox {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            border: 1px solid #e1e1e1;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s;
            color: var(--text-dark);
        }

        .searchbox:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(157, 127, 206, 0.1);
        }

        .current-location {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }

        .current-location:hover {
            opacity: 0.8;
        }

        /* Location Details Display */
        .location-details {
            background: #fdfbff;
            border: 1px dashed var(--primary);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 40px;
            display: none;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #aeaeae;
            font-weight: 700;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(157, 127, 206, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px 0 20px 0;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Popular Cities Grid */
        .popular-section {
            margin-bottom: 48px;
        }

        .popular-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
        }

        @media (max-width: 768px) {
            .popular-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .popular-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .city-card {
            background: var(--primary-light);
            border-radius: 16px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            text-align: center;
        }

        .city-card:hover {
            transform: translateY(-4px);
            background: var(--white);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(157, 127, 206, 0.1);
        }

        .city-card svg {
            width: 60px;
            height: 60px;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .city-card .city-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* All Cities Section */
        .all-cities-section {
            display: flex;
            flex-direction: column;
        }

        .alphabet-index {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 600;
            color: #aeaeae;
        }

        .alphabet-index span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .alphabet-index span:hover {
            color: var(--primary);
        }

        .alphabet-index span.active {
            color: var(--primary);
        }

        .cities-list-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        @media (max-width: 768px) {
            .cities-list-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .cities-list-grid {
                grid-template-columns: 1fr;
            }
        }

        .city-item {
            font-size: 15px;
            font-weight: 500;
            color: #444;
            cursor: pointer;
            padding: 6px 0;
            transition: color 0.2s;
        }

        .city-item:hover {
            color: var(--primary);
        }

        .search-results {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

        </div>

        <div class="current-location" onclick="useCurrentLocation()">

        <div id="loader" class="loader"></div>

                <div class="detail-item">

                </div>
                <div class="detail-item">

                    <div id="state" class="detail-value">—</div>
                </div>
            </div>
        </div>

        <div id="defaultSections">

                <h2 class="section-title">Popular Cities</h2>

        </div>

        <div id="searchResults" class="search-results">
            <h2 class="section-title">Search Results</h2>
            <div class="cities-list-grid" id="resultsGrid"></div>
        </div>

        function init() {
            renderPopular();
            renderAlphabet();
            renderCities('A');

            document.getElementById('searchInput').addEventListener('input', (e) => handleSearch(e.target.value));
        }

        function renderPopular() {
            const grid = document.getElementById('popularGrid');
            grid.innerHTML = POPULAR_CITIES.map(city => `
                <div class="city-card" onclick="selectLocation('${city.name}')">
                    <svg viewBox="0 0 60 60">${ICONS[city.icon] || ICONS.mumbai}</svg>
                    <div class="city-name">${city.name}</div>
                </div>
            `).join('');
        }

        function renderAlphabet() {
            const index = document.getElementById('alphabetIndex');
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            index.innerHTML = letters.map(l => `<span id="alpha-${l}" onclick="renderCities('${l}')">${l}</span>`).join('');
            document.getElementById('alpha-A').classList.add('active');
        }

        function renderCities(letter) {
            const grid = document.getElementById('allCitiesGrid');
            const filtered = ALL_CITIES.filter(c => c.startsWith(letter));

            // Update active letter
            document.querySelectorAll('.alphabet-index span').forEach(s => s.classList.remove('active'));
            document.getElementById(`alpha-${letter}`).classList.add('active');

            grid.innerHTML = filtered.map(city => `
                <div class="city-item" onclick="selectLocation('${city}')">${city}</div>
            `).join('');
        }

        function handleSearch(query) {
            const defaultDiv = document.getElementById('defaultSections');
            const resultsDiv = document.getElementById('searchResults');
            const resultsGrid = document.getElementById('resultsGrid');

            if (!query || query.trim().length === 0) {
                defaultDiv.style.display = 'block';
                resultsDiv.style.display = 'none';
                return;
            }

            defaultDiv.style.display = 'none';
            resultsDiv.style.display = 'block';

            const filtered = ALL_CITIES.filter(c => c.toLowerCase().includes(query.toLowerCase()));

            if (filtered.length === 0) {
                resultsGrid.innerHTML = `<div style="grid-column: 1/-1; padding: 40px; color: #aeaeae; text-align: center;">No cities found for "${query}"</div>`;
            } else {
                resultsGrid.innerHTML = filtered.map(city => `
                    <div class="city-item" onclick="selectLocation('${city}')">${city}</div>
                `).join('');
            }
        }

        async function fetchLocationDetails(lat, lng, cityName = null) {
            const resultsDiv = document.getElementById("results");
            const loader = document.getElementById("loader");

            loader.style.display = "block";
            resultsDiv.style.display = "none";

            try {
                let url;
                if (cityName) {
                    url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(cityName + ", India")}&key=${API_KEY}`;
                } else {
                    url = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${API_KEY}`;
                }

                const res = await fetch(url);
                const data = await res.json();

                if (!data.results || data.results.length === 0) {
                    throw new Error("No results found");
                }

                let area = "";
                let locality = "";
                let district = "";
                let state = "";

                // We pick the most relevant result (usually index 0)
                // However, we loop through all results to find the most specific locality if index 0 is too broad
                const bestResult = data.results[0];
                const components = bestResult.address_components;

                components.forEach(c => {
                    const types = c.types;

                    // Neighborhood/Area
                    if (types.includes("sublocality") || types.includes("sublocality_level_1") || types.includes("neighborhood") || types.includes("sublocality_level_2")) {
                        area = c.long_name;
                    }

                    // City / Locality
                    if (types.includes("locality")) {
                        locality = c.long_name;
                    }

                    // District / Admin Area 2
                    if (types.includes("administrative_area_level_2")) {
                        district = c.long_name;
                    }

                    // State / Admin Area 1
                    if (types.includes("administrative_area_level_1")) {
                        state = c.long_name;
                    }
                });

                // Refinement for Indian Address inconsistencies
                // If locality is missing but district exists, the city is likely the district
                if (!locality && district) locality = district;
                // If district is missing but locality exists, they are often the same
                if (!district && locality) district = locality;

                // Fallback for Area if still empty
                if (!area) {
                    const subLocality = components.find(c => c.types.includes("sublocality"));
                    if (subLocality) area = subLocality.long_name;
                }

                document.getElementById("locality").innerText = locality || (cityName || "Not found");
                document.getElementById("district").innerText = district || "Not found";
                document.getElementById("area").innerText = area || "Not found";
                document.getElementById("state").innerText = state || "Not found";

                resultsDiv.style.display = "block";
            } catch (error) {
                console.error(error);
                alert("Error fetching location details. Please check your connection.");
            } finally {
                loader.style.display = "none";
            }
        }

        function selectLocation(name) {
            document.getElementById("searchInput").value = name;
            fetchLocationDetails(null, null, name);
        }

        function useCurrentLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }

            navigator.geolocation.getCurrentPosition(function (pos) {
                fetchLocationDetails(pos.coords.latitude, pos.coords.longitude);
            }, function (error) {
                alert("Location access denied or unavailable.");
            }, {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            });
        }

        window.onload = init;
    </script>
