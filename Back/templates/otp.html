<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ticpin OTP Verification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anek+Latin:wght@400;500;600;700;800&display=swap');
    </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Anek Latin', 'Arial', sans-serif; background-color: #f3f4f6;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#f3f4f6" style="padding: 40px 0;">
        <tr>
            <td align="center">
                <table width="711" border="0" cellspacing="0" cellpadding="0" bgcolor="#0A0132" style="border-radius: 20px; border: 1px solid #ffffff; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                    
                    <!-- Purple Header -->
                    <tr>
                        <td align="center" bgcolor="#5331EA" style="padding: 35px 0; border-radius: 15px 15px 0 0;">
                            <span style="color: #ffffff; font-weight: 900; font-size: 42px; letter-spacing: 0.15em; font-family: 'Arial Black', Gadget, sans-serif;">
                                TIC<span style="color: #ffffff;">P</span>IN
                            </span>
                        </td>
                    </tr>

                    <!-- White Content Box Container (using padding to simulate the design's margin) -->
                    <tr>
                        <td style="padding: 0 50px;">
                            <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#ffffff" style="border-radius: 20px; margin-top: 0;">
                                <tr>
                                    <td align="center" style="padding: 45px 32px;">
                                        <h2 style="font-size: 32px; font-weight: 600; color: #000000; margin: 0 0 24px 0; font-family: 'Anek Latin', sans-serif;">Welcome to Ticpin</h2>
                                        
                                        <div style="width: 100%; border-top: 1px solid #AEAEAE; margin: 0 0 28px 0;"></div>

                                        <p style="font-size: 22px; font-weight: 500; color: #000000; margin: 0 0 8px 0; font-family: 'Anek Latin', sans-serif;">Your OTP for login is</p>

                                        <p style="font-size: 48px; font-weight: 700; color: #000000; margin: 12px 0 28px 0; letter-spacing: 0.2em; font-family: 'Anek Latin', sans-serif;">{{.OTP}}</p>

                                        <p style="font-size: 18px; font-weight: 500; color: #000000; margin: 0; font-family: 'Anek Latin', sans-serif;">This is valid for 5mins</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer Section -->
                    <tr>
                        <td style="padding: 30px 50px 40px 50px;">
                            <p style="color: #ffffff; font-weight: 700; font-size: 26px; margin: 0 0 10px 0; font-family: 'Anek Latin', sans-serif;">LOOKING FOR HELP?</p>
                            <p style="color: #ffffff; font-size: 18px; font-weight: 500; margin: 0 0 28px 0; font-family: 'Anek Latin', sans-serif; line-height: 1.5;">
                                Mail us at <a href="mailto:support@ticpin.in" style="color: #7C5CFC; text-decoration: underline;">support@ticpin.in</a> (10AM-5PM), and we'll help you out.
                            </p>

                            <div style="width: 100%; border-top: 1px solid #ffffff; margin: 0 0 28px 0;"></div>

                            <!-- Social Icons -->
                            <table align="center" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center" style="font-size: 16px; color: #ffffff; font-weight: 600; font-family: 'Anek Latin', sans-serif;">
                                        Stay Connected with Ticpin
                                    </td>
                                </tr>
                            </table>

                            <div style="width: 100%; border-top: 1px solid #ffffff; margin: 28px 0 0 0;"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
